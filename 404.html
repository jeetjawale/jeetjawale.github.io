<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404: Not Found</title>
  <meta name="description" content="The page you're looking for doesn't exist.">
  <meta property="og:image" content="https://jeetjawale.github.io/assets/images/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:image" content="https://jeetjawale.github.io/assets/images/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .error-container {
      max-width: 600px;
      padding: 2rem;
    }
    .error-code {
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 800;
      color: var(--red-b);
      margin-bottom: 0.5rem;
      text-shadow: 0 0 20px rgba(204, 36, 29, 0.4);
      line-height: 1;
    }
    .error-message {
      font-size: 1.5rem;
      color: var(--fg1);
      margin-bottom: 1.5rem;
      font-weight: bold;
    }
    .error-details {
      color: var(--fg3);
      margin-bottom: 3rem;
      line-height: 1.6;
    }
    .error-nav {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <!-- CRT Scanlines -->
  <div class="crt-scanlines" aria-hidden="true"></div>

<!-- NEURAL NETWORK CANVAS (fixed background) -->
<canvas id="nn-canvas" aria-hidden="true"></canvas>

<div class="site-container">
  <main>
    <div class="page-col" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh;">
      <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-message">bash: /path: No such file or directory</div>
        <p class="error-details">The system couldn't locate the resource you were looking for. It might have been rm -rf'd, moved, or deleted during a deployment.</p>
        
        <div class="error-nav">
          <a href="index.html?skipBoot=1" class="btn-terminal btn-terminal-fill">cd ~/home</a>
          <a href="index.html?skipBoot=1#contact" class="btn-terminal btn-terminal-outline">Get in Touch</a>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-bottom-row" style="justify-content: center;">
      <div>&copy; <span id="year"></span> All rights reserved</div>
    </div>
  </footer>
</div>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
</script>
<script src="assets/js/main.js"></script>
</body>
</html>
