<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404: Not Found</title>
  <meta name="description" content="The page you're looking for doesn't exist.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .error-container {
      max-width: 600px;
      padding: 2rem;
    }
    .error-code {
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 800;
      color: var(--red-b);
      margin-bottom: 0.5rem;
      text-shadow: 0 0 20px rgba(204, 36, 29, 0.4);
      line-height: 1;
    }
    .error-message {
      font-size: 1.5rem;
      color: var(--fg1);
      margin-bottom: 1.5rem;
      font-weight: bold;
    }
    .error-details {
      color: var(--fg3);
      margin-bottom: 3rem;
      line-height: 1.6;
    }
    .error-nav {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

<!-- NEURAL NETWORK CANVAS (fixed background) -->
<canvas id="nn-canvas" aria-hidden="true"></canvas>

<div class="error-container">
  <div class="error-code">404</div>
  <div class="error-message">bash: /path: No such file or directory</div>
  <p class="error-details">The system couldn't locate the resource you were looking for. It might have been rm -rf'd, moved, or deleted during a deployment.</p>
  
  <div class="error-nav">
    <a href="index.html" class="btn-terminal btn-terminal-fill">cd ~/home</a>
    <a href="index.html#contact" class="btn-terminal btn-terminal-outline">Get in Touch</a>
  </div>
</div>

<script src="assets/js/main.js"></script>
</body>
</html>
