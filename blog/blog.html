<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blogs</title>
  <meta name="description" content="Thoughts and insights on infrastructure, automation, and building reliable systems.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<!-- NEURAL NETWORK CANVAS (fixed background) -->
<canvas id="nn-canvas" aria-hidden="true"></canvas>

<main>
  <div class="page-col" style="padding-top: 4rem;">
    
    <div style="margin-bottom: 3rem; display: flex; gap: 1rem;">
      <a href="../index.html?skipBoot=1" class="btn-terminal btn-terminal-outline" style="font-size: 0.8rem; padding: 0.4rem 0.8rem;">cd ~/home</a>
    </div>

    <div class="post-header">
      <div style="color: var(--yellow); font-size: 0.9rem; margin-bottom: 1rem;">$ ls -l ~/blog</div>
      <h1>Thoughts & Writings</h1>
      <p style="color: var(--fg3);">Notes on infrastructure, Linux, automation, and things that break in production.</p>
    </div>

    <div class="blog-filters">
      <input type="text" class="search-box" id="search-box" placeholder="grep 'search posts...'">
      <button type="button" class="filter-btn active" data-filter="all">All</button>
      <button type="button" class="filter-btn" data-filter="Linux">Linux</button>
    </div>

    <div class="blog-list" id="posts-grid">
      <!-- Posts will be inserted here by JS -->
    </div>

    <div id="no-results" style="display: none; color: var(--fg3); font-style: italic;">
      grep: no match found
    </div>
  </div>
</main>

<footer>
  <div class="footer-bottom-row" style="justify-content: center;">
    <div>Jeet Jawale — &copy; <span id="year"></span></div>
  </div>
</footer>

<script src="./posts.js"></script>
<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const posts = blogPosts || [];
  let currentFilter = 'all';
  let currentSearch = '';

  function renderPosts() {
    const postsGrid = document.getElementById('posts-grid');
    const noResults = document.getElementById('no-results');
    postsGrid.innerHTML = '';
    
    const filtered = posts.filter(post => {
      const pCat = (post.category || '').toLowerCase();
      const cFilter = (currentFilter || '').toLowerCase();
      const matchesFilter = (cFilter === 'all') || (pCat === cFilter);
      
      const search = (currentSearch || '').toLowerCase();
      const pTitle = (post.title || '').toLowerCase();
      const pExcerpt = (post.excerpt || '').toLowerCase();
      const matchesSearch = pTitle.includes(search) || pExcerpt.includes(search);
      
      return matchesFilter && matchesSearch;
    });
    
    if (filtered.length === 0) {
      noResults.style.display = 'block';
      return;
    }
    
    noResults.style.display = 'none';
    
    filtered.forEach((post, index) => {
      const postItem = document.createElement('a');
      postItem.href = `./${post.id}.html`;
      postItem.className = 'blog-item';
      
      const badge = post.latest ? '<span style="color:var(--red-b); border:1px solid var(--red-b); padding:2px 6px; font-size:0.6rem; margin-left:0.5rem; border-radius:2px;">LATEST</span>' : '';
      
      postItem.innerHTML = `
        <div>
          <div class="blog-cat">${post.category} ${badge}</div>
          <div class="blog-title">${post.title}</div>
          <div class="blog-meta">${post.date} · ${post.readTime}</div>
        </div>
        <div class="blog-arr">→</div>
      `;
      postsGrid.appendChild(postItem);
      
      // The CSS sets .blog-item to opacity: 0 by default for the scroll animation.
      // We must add the .in class so they actually show up after filtering!
      setTimeout(() => postItem.classList.add('in'), 10 + (index * 30));
    });
  }

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderPosts();
    });
  });

  // Search box
  document.getElementById('search-box')?.addEventListener('input', (e) => {
    currentSearch = e.target.value;
    renderPosts();
  });

  // Initial render
  renderPosts();
</script>

<script src="../assets/js/main.js"></script>
</body>
</html>
