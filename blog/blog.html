<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog - Jeet Jawale</title>
<meta name="description" content="Latest blog posts about backend development, full-stack applications, and software engineering.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👽</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --bg2: #f7f7f7;
  --border: #e8e8e8;
  --border2: #d0d0d0;
  --text: #0a0a0a;
  --muted: #777;
  --mid: #444;
  --accent: #0a0a0a;
  --surface: #f2f2f2;
  --ink: #0a0a0a;
  --ink-muted: #333;
  --nav-bg: rgba(255,255,255,.92);
}

[data-theme="dark"] {
  --bg: #0a0a0a;
  --bg2: #1a1a1a;
  --border: #2a2a2a;
  --border2: #404040;
  --text: #f0f0f0;
  --muted: #999;
  --mid: #bbb;
  --accent: #f0f0f0;
  --surface: #151515;
  --ink: #f0f0f0;
  --ink-muted: #ccc;
  --nav-bg: rgba(10,10,10,.92);
}

body { 
  transition: background .3s, color .3s;
  background: var(--bg);
  color: var(--text);
  font-family: 'Fira Code', monospace;
  font-size: 16px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

/* ─── SCROLLBAR ─── */
* { scrollbar-width: none; }
::-webkit-scrollbar { width: 0; height: 0; }

/* ─── NAV ─── */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 400;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 clamp(2rem, 6vw, 5rem);
  background: rgba(255,255,255,0);
  border-bottom: 1px solid transparent;
  transition: background .5s, border-color .5s;
}

nav.scrolled {
  background: var(--nav-bg);
  border-color: var(--border);
  backdrop-filter: blur(20px);
}

.nav-logo {
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: -.03em;
  color: var(--text);
  text-decoration: none;
}

.nav-links {
  display: flex;
  gap: 2.5rem;
  list-style: none;
}

.nav-links a {
  font-size: .82rem;
  color: var(--muted);
  text-decoration: none;
  transition: color .2s;
}

.nav-links a:hover {
  color: var(--text);
}

.nav-back {
  font-size: .75rem;
  color: var(--muted);
  text-decoration: none;
  padding: .55rem 1.2rem;
  border: 1.5px solid var(--border2);
  transition: all .25s;
}

.nav-back:hover {
  border-color: var(--ink);
  color: var(--ink);
}

/* ─── MAIN ─── */
main {
  padding-top: 120px;
  max-width: 960px;
  margin: 0 auto;
  padding-left: clamp(2rem, 6vw, 6rem);
  padding-right: clamp(2rem, 6vw, 6rem);
}

.blog-header {
  margin-bottom: 4rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid var(--border);
}

.blog-header h1 {
  font-size: clamp(2.5rem, 6vw, 4rem);
  font-weight: 800;
  letter-spacing: -.045em;
  margin-bottom: 1rem;
  line-height: 1.1;
}

.blog-header p {
  font-size: 1rem;
  color: var(--muted);
  font-weight: 300;
  max-width: 500px;
}

/* ─── POSTS GRID ─── */
.posts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 2rem;
  margin-bottom: 4rem;
}

.post-card {
  padding: 2rem;
  border: 1px solid var(--border);
  background: var(--bg);
  transition: all .3s cubic-bezier(.16,1,.3,1);
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
}

.post-card:hover {
  border-color: var(--ink);
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,.1);
}

.post-date {
  font-size: .75rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: .8rem;
}

.post-title {
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: -.02em;
  margin-bottom: 1rem;
  line-height: 1.3;
}

.post-excerpt {
  font-size: .92rem;
  color: var(--muted);
  line-height: 1.8;
  font-weight: 300;
  margin-bottom: 1.5rem;
  flex-grow: 1;
}

.post-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  font-size: .8rem;
}

.post-read-time {
  color: var(--muted);
}

.post-arrow {
  color: var(--muted);
  transition: all .2s;
}

.post-card:hover .post-arrow {
  color: var(--ink);
  transform: translate(3px, -3px);
}

.post-card:hover {
  transform: translateY(-4px);
}

/* ─── CATEGORY BADGE ─── */
.post-badge {
  display: inline-block;
  background: var(--bg2);
  color: var(--text);
  font-size: .65rem;
  padding: .25rem .6rem;
  border-radius: 3px;
  font-weight: 500;
  letter-spacing: .05em;
  border: 1px solid var(--border);
  margin-bottom: .5rem;
}

.post-badge.latest {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .7; }
}

/* ─── SEARCH/FILTER ─── */
.blog-filters {
  margin-bottom: 3rem;
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  align-items: center;
}

.filter-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: .5rem 1rem;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Fira Code', monospace;
  font-size: .75rem;
  transition: all .2s;
}

.filter-btn:hover,
.filter-btn.active {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}

.search-box {
  flex: 1;
  min-width: 200px;
  padding: .5rem 1rem;
  border: 1px solid var(--border);
  background: var(--bg2);
  border-radius: 4px;
  color: var(--text);
  font-family: 'Fira Code', monospace;
  font-size: .85rem;
  transition: all .2s;
}

.search-box:focus {
  outline: none;
  border-color: var(--ink);
  background: var(--bg);
}

.no-results {
  text-align: center;
  color: var(--muted);
  padding: 3rem 0;
  font-size: .95rem;
}

/* ─── FOOTER ─── */
footer {
  border-top: 1px solid var(--border);
  padding: 2rem clamp(2rem, 8vw, 10rem);
  background: var(--bg2);
}

.footer-content {
  max-width: 1200px;
  margin: 0 auto;
  text-align: center;
}

.footer-socials {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}

.footer-social {
  color: var(--muted);
  text-decoration: none;
  font-size: .85rem;
  padding: .5rem 1rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  transition: all .2s;
  background: transparent;
}

.footer-social:hover {
  background: var(--text);
  border-color: var(--text);
  color: var(--bg);
  transform: translateY(-2px);
}

.footer-content p {
  color: var(--muted);
  font-size: .85rem;
  margin: 0;
}

/* ─── THEME TOGGLE ─── */
.theme-toggle {
  background: var(--surface);
  border: 1px solid var(--border);
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1.1rem;
  color: var(--text);
  transition: all .25s;
}

.theme-toggle:hover {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--bg);
}

/* ─── RESPONSIVE ─── */
@media (max-width: 680px) {
  main {
    padding-top: 100px;
  }
  
  .posts-grid {
    grid-template-columns: 1fr;
  }
  
  nav {
    height: 50px;
  }
}

/* ─── BACK TO TOP ─── */
.back-to-top {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  width: 50px;
  height: 50px;
  background: var(--text);
  color: var(--bg);
  border: none;
  font-size: 1.2rem;
  cursor: pointer;
  z-index: 300;
  opacity: 0;
  visibility: hidden;
  transition: all .3s cubic-bezier(.16,1,.3,1);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 12px rgba(0,0,0,.15);
}
.back-to-top.visible {
  opacity: 1;
  visibility: visible;
}
.back-to-top:hover {
  background: var(--mid);
  transform: translateY(-3px);
  box-shadow: 0 6px 16px rgba(0,0,0,.2);
}
.back-to-top:focus {
  outline: 2px solid var(--text);
  outline-offset: 2px;
}
</style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <a href="../index.html" class="nav-logo">Jeet</a>
  <div class="nav-links">
    <a href="../index.html">Home</a>
    <a href="./blog.html" style="color: var(--text);">Blog</a>
  </div>
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">☾</button>
</nav>

<main>
  <div class="blog-header">
    <h1>Blog</h1>
    <p>Thoughts and insights on backend development, full-stack applications, and software engineering practices.</p>
  </div>

  <!-- FILTERS -->
  <div class="blog-filters">
    <input type="text" class="search-box" id="search-box" placeholder="Search posts...">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="Linux">Linux</button>
  </div>

  <div class="posts-grid" id="posts-grid">
    <!-- Posts will be inserted here -->
  </div>

  <div class="no-results" id="no-results" style="display: none;">
    No posts found matching your search.
  </div>
</main>

<!-- BACK TO TOP -->
<button class="back-to-top" id="back-to-top" aria-label="Back to top">↑</button>

<footer>
  <div class="footer-content">
    <div class="footer-socials">
      <a href="https://github.com/jeetjawale" target="_blank" rel="noopener noreferrer" class="footer-social" title="GitHub">GitHub</a>
      <a href="https://www.linkedin.com/in/jeetjawale" target="_blank" rel="noopener noreferrer" class="footer-social" title="LinkedIn">LinkedIn</a>
      <a href="https://x.com/jeet_jawale" target="_blank" rel="noopener noreferrer" class="footer-social" title="Twitter/X">Twitter</a>
      <a href="mailto:jeetjawale@zohomail.in" class="footer-social" title="Email">Email</a>
    </div>
    <p>&copy; 2026 Jeet Jawale. All rights reserved.</p>
  </div>
</footer>

<script src="./posts.js"></script>
<script>
// Dark mode
const themeToggle = document.getElementById('theme-toggle');
const themeIcon = themeToggle;
const savedTheme = localStorage.getItem('theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
themeIcon.textContent = savedTheme === 'dark' ? '☀' : '☾';

themeToggle.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  themeIcon.textContent = next === 'dark' ? '☀' : '☾';
});

// Navbar scroll effect
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 50);
}, { passive: true });

// Use posts from shared posts.js
const posts = blogPosts;

// Render posts with filtering
let currentFilter = 'all';
let currentSearch = '';

function renderPosts() {
  const postsGrid = document.getElementById('posts-grid');
  const noResults = document.getElementById('no-results');
  postsGrid.innerHTML = '';
  
  const filtered = posts.filter(post => {
    const matchesFilter = currentFilter === 'all' || post.category === currentFilter;
    const matchesSearch = post.title.toLowerCase().includes(currentSearch.toLowerCase()) ||
                         post.excerpt.toLowerCase().includes(currentSearch.toLowerCase()) ||
                         post.category.toLowerCase().includes(currentSearch.toLowerCase());
    return matchesFilter && matchesSearch;
  });
  
  if (filtered.length === 0) {
    noResults.style.display = 'block';
    return;
  }
  
  noResults.style.display = 'none';
  
  filtered.forEach(post => {
    const postCard = document.createElement('a');
    postCard.href = `./${post.id}.html`;
    postCard.className = 'post-card';
    postCard.innerHTML = `
      <div class="post-date">${post.date}</div>
      ${post.latest ? '<span class="post-badge latest">Latest</span>' : ''}
      <span class="post-badge">${post.category}</span>
      <h2 class="post-title">${post.title}</h2>
      <p class="post-excerpt">${post.excerpt}</p>
      <div class="post-meta">
        <span class="post-read-time">${post.readTime} • ${post.wordCount.toLocaleString()} words</span>
        <span class="post-arrow">↗</span>
      </div>
    `;
    postsGrid.appendChild(postCard);
  });
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderPosts();
  });
});

// Search box
document.getElementById('search-box')?.addEventListener('input', (e) => {
  currentSearch = e.target.value;
  renderPosts();
});

// Initial render
renderPosts();

/* ── BACK TO TOP ── */
const backToTop = document.getElementById('back-to-top');
window.addEventListener('scroll', () => {
  backToTop?.classList.toggle('visible', window.scrollY > 500);
}, { passive: true });

backToTop?.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
</script>

</body>
</html>
